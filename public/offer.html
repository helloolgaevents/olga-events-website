<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olga Events — Wedding Packages</title>
<meta name="description" content="Olga Events wedding planning & décor packages with full details and a live price calculator. Dubai & all Emirates.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@500;600;700&family=Inter:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#5E7D46;--green-d:#436031;--dark:#111110;--ink:#141414;--ivory:#f4f1ea;--cream:#fbf9f4;--beige:#ece4d4;--gold:#a8854e;--gold-l:#c2a36b;--line:#e3ddd0;--muted:#5b574e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ivory);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}
  body[dir=rtl]{font-family:'Noto Naskh Arabic','Inter',sans-serif}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:500;color:var(--dark)}
  body[dir=rtl] h1,body[dir=rtl] h2,body[dir=rtl] h3{font-family:'Noto Naskh Arabic',serif;font-weight:700}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1200px;margin:0 auto;padding:0 40px}
  .kick{font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:600;color:var(--gold)}

  .nav{position:sticky;top:0;z-index:30;background:#15130e;border-bottom:1px solid #3a3327}
  .nav .in{max-width:1200px;margin:0 auto;padding:15px 40px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .logo{font-family:'Cormorant Garamond',serif;font-size:23px;letter-spacing:3px;color:#f3ecdd;font-weight:500}
  .langs{display:flex;gap:6px}
  .langs button{font-family:'Inter';background:transparent;border:1px solid #4a4233;color:#cfc6b2;font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;cursor:pointer}
  .langs button.on{background:var(--gold-l);border-color:var(--gold-l);color:#15130e}

  .cover{text-align:center;padding:64px 40px 40px;border-bottom:1px solid var(--line)}
  .cover h1{font-size:50px;line-height:1.06;margin-top:12px}
  .cover p{font-size:18px;color:var(--muted);max-width:720px;margin:14px auto 0}
  .ln{width:56px;height:1px;background:var(--gold);margin:20px auto}

  .sec{padding:58px 0;border-bottom:1px solid var(--line)}
  .sec h2{font-size:38px;text-align:center}
  .sec .lead{font-size:17px;color:var(--muted);max-width:760px;margin:12px auto 0;text-align:center}

  .paths{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:34px}
  .path{border:1px solid var(--line);border-radius:16px;padding:28px;background:var(--cream)}
  .path.best{border:1.5px solid var(--green);background:#f1f5ec}
  .path .tag{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:600}
  .path.best .tag{color:var(--green-d)}
  .path h3{font-size:26px;margin:7px 0 9px}
  .path p{font-size:15.5px;color:var(--ink)}

  .cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;margin-top:34px;align-items:start}
  .pkg{background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 26px;position:relative;display:flex;flex-direction:column}
  .pkg.win{border:1.5px solid var(--green);box-shadow:0 16px 42px rgba(67,96,49,.13)}
  .pkg .badge{position:absolute;top:-13px;inset-inline-start:26px;background:var(--green);color:#fff;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;padding:6px 14px;border-radius:7px}
  .pkg .nm{font-family:'Cormorant Garamond',serif;font-size:29px;font-weight:500;color:var(--dark)}
  body[dir=rtl] .pkg .nm{font-family:'Noto Naskh Arabic',serif;font-weight:700}
  .pkg .ro{font-size:11.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin:4px 0 12px}
  .pkg .prices{border-top:1px solid var(--line);padding-top:13px;min-height:60px}
  .pkg .was{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--muted);text-decoration:line-through;text-decoration-color:var(--gold-l)}
  .pkg .pr{font-family:'DM Sans',sans-serif;font-size:30px;font-weight:600;color:var(--green-d);line-height:1.1}
  .pkg .perg{font-size:12.5px;color:var(--green-d);background:#eef3e6;border-radius:8px;padding:7px 11px;margin-top:10px}
  .grp{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--gold);font-weight:600;margin:16px 0 5px}
  .pkg ul{list-style:none}
  .pkg li{font-size:14.5px;color:var(--ink);padding:5px 0 5px 24px;position:relative;line-height:1.5}
  .pkg li:before{content:'✓';position:absolute;left:0;top:5px;color:var(--green);font-weight:700}
  body[dir=rtl] .pkg li{padding:5px 24px 5px 0}
  body[dir=rtl] .pkg li:before{left:auto;right:0}
  .pkg .pick{margin-top:auto;text-align:center;background:var(--green);color:#fff;font-size:13.5px;font-weight:600;padding:12px;border-radius:10px;margin-top:18px}
  .pkg .pick.ghost{background:#fff;border:1.5px solid var(--green);color:var(--green-d)}

  .guestrow{display:inline-flex;align-items:center;gap:12px;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:11px 16px;margin-top:18px;flex-wrap:wrap}
  .guestrow label{font-size:13px;font-weight:600;color:var(--muted)}
  .guestrow input[type=range]{width:200px;accent-color:var(--green)}
  .guestrow input[type=number]{width:88px;font-family:'DM Sans';font-size:16px;font-weight:600;color:var(--green-d);text-align:center;padding:7px;border:1.5px solid var(--line);border-radius:9px}
  .ghint{font-size:12.5px;color:var(--muted);margin-inline-start:10px;font-style:italic}

  .quotebox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 28px;margin-top:26px;max-width:720px;margin-inline:auto}
  .qrow{display:flex;align-items:center;gap:14px;margin-bottom:13px;flex-wrap:wrap}
  .qrow>label{font-size:14px;font-weight:600;color:var(--muted);width:130px}
  .qrow select,.qrow input[type=number]{font-family:'DM Sans';padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:15px;background:#fff;flex:1;min-width:150px}
  .qrow input[type=range]{flex:1;min-width:150px;accent-color:var(--green)}
  .qsum{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}
  .qsum .ql{display:flex;justify-content:space-between;font-size:15px;padding:5px 0;color:var(--ink)}
  .qsum .ql span:last-child{font-family:'DM Sans';font-weight:600}
  .qtot{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;padding-top:11px;border-top:2px solid var(--dark)}
  .qtot .l{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
  .qtot .v{font-family:'DM Sans';font-size:30px;font-weight:700;color:var(--green-d)}
  .qsave{background:#f1f5ec;border:1px solid #cfe0bd;border-radius:10px;padding:11px 15px;margin-top:14px;font-size:14px;color:var(--green-d)}
  .qsave b{font-family:'DM Sans';font-weight:700}
  .qincl{font-size:12.5px;color:var(--muted);margin-top:10px}

  .note{background:var(--cream);border:1px solid var(--line);border-inline-start:3px solid var(--gold);border-radius:12px;padding:18px 22px;margin-top:26px;font-size:14.5px;color:var(--ink);max-width:900px;margin-inline:auto}

  .cta{padding:66px 40px;text-align:center}
  .cta h2{font-size:42px}
  .cta p{font-size:17px;color:var(--muted);max-width:580px;margin:13px auto 22px}
  .btns{display:flex;gap:13px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:9px;font-size:15px;font-weight:600;padding:15px 26px;border-radius:11px}
  .btn.wa{background:#25D366;color:#fff}.btn.cons{background:var(--green);color:#fff}

  .foot{background:#15130e;padding:38px;text-align:center;color:#cfc6b2;font-size:14px}
  .foot .lg{font-family:'Cormorant Garamond',serif;font-size:23px;letter-spacing:3px;color:#f3ecdd;font-weight:500;margin-bottom:7px}
  .wafloat{position:fixed;inset-inline-end:22px;bottom:22px;z-index:50;background:#25D366;color:#fff;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(0,0,0,.25);font-size:28px}

  @media(max-width:880px){.wrap,.nav .in{padding-left:20px;padding-right:20px}.cover h1{font-size:38px}.sec h2,.cta h2{font-size:30px}.paths{grid-template-columns:1fr}.cols{grid-template-columns:1fr}}
</style>
</head>

</section>

let L='en';
function waLink(){return `https://wa.me/${WA}?text=`+encodeURIComponent(T[L].waMsg);}
function setText(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

function render(l){
 L=l; const t=T[l];
 document.body.setAttribute('dir',t.dir); document.documentElement.lang=l;
 ["coverKick","coverTitle","coverSub","pathsTitle","pAtag","pAtitle","pAtext","pBtag","pBtitle","pBtext","planTitle","planLead","decorTitle","decorLead","gLbl","gHint","decorNote","calcTitle","calcLead","qLplan","qLdec","qLg","qSplan","qStot","qSsave1","qIncl","ctaTitle","ctaSub","waLabel","consLabel","footTag"].forEach(id=>setText(id,t[id]));

 // planning cards
 const pc=document.getElementById('planCols'); pc.innerHTML='';
 t.plan.forEach(p=>{
   let groups=p.g.map(gr=>`<div class="grp">${gr[0]}</div><ul>${gr[1].map(i=>`<li>${i}</li>`).join('')}</ul>`).join('');
   pc.insertAdjacentHTML('beforeend',`<div class="pkg ${p.win?'win':''}">${p.win?`<div class="badge">${t.most}</div>`:''}<div class="nm">${p.nm}</div><div class="ro">${p.ro}</div><div class="prices"><div class="was">${t.was} ${t.cur} ${p.was}</div><div class="pr">${t.cur} ${p.pr}</div></div><a class="pick ${p.win?'':'ghost'}" href="${waLink()}" target="_blank">${t.consLabel}</a>${groups}</div>`);
 });

 // decor cards (prices via data-price, filled by calc)
 const dc=document.getElementById('decorCols'); dc.innerHTML='';
 t.decor.forEach(p=>{
   let groups=p.g.map(gr=>`<div class="grp">${gr[0]}</div><ul>${gr[1].map(i=>`<li>${i}</li>`).join('')}</ul>`).join('');
   dc.insertAdjacentHTML('beforeend',`<div class="pkg ${p.win?'win':''}">${p.win?`<div class="badge">${t.most}</div>`:''}<div class="nm">${p.nm}</div><div class="ro">${p.ro}</div><div class="prices"><div class="was">${t.was} <span data-was="${p.k}"></span></div><div class="pr"><span data-price="${p.k}"></span></div></div><div class="perg">${p.perg}</div><a class="pick ${p.win?'':'ghost'}" href="${waLink()}" target="_blank">${t.consLabel}</a>${groups}</div>`);
 });

 // selects
 const qp=document.getElementById('qplan'); qp.innerHTML='';
 [["6650","7000"],["9500","10000"],["17100","18000"]].forEach((v,i)=>{const o=document.createElement('option');o.value=v[0];o.dataset.std=v[1];o.textContent=t.planSel[i];if(i===1)o.selected=true;qp.appendChild(o);});
 const qd=document.getElementById('qdec'); qd.innerHTML='';
 ["soiree","signature","atelier"].forEach((k,i)=>{const o=document.createElement('option');o.value=k;o.textContent=t.decSel[i];if(i===1)o.selected=true;qd.appendChild(o);});

 // links
 document.getElementById('waBtn').href=waLink();
 document.getElementById('consBtn').href=waLink();
 document.getElementById('waFloat').href=waLink();
 document.querySelectorAll('.langs button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));

 bindCalc(); decorCalc(); quoteCalc();
}

// ---- décor live prices ----
const cg=()=>document.getElementById('cg'), cgn=()=>document.getElementById('cgn');
function decorCalc(){
 const guests=Math.max(100,+cgn().value||100);
 const eg=Math.max(0,guests-100), et=Math.max(0,Math.ceil(guests/10)-10);
 for(const k in PRICE){const add=eg*50+et*PRICE[k].cp;const bundle=PRICE[k].base+add;const std=Math.round(bundle*PRICE[k].std/PRICE[k].base);
   const e=document.querySelector(`[data-price="${k}"]`); if(e)e.textContent=`${T[L].cur} ${fmt(bundle)}`;
   const w=document.querySelector(`[data-was="${k}"]`); if(w)w.textContent=`${T[L].cur} ${fmt(std)}`;}
}
// ---- proposal calculator ----
function quoteCalc(){
 const qp=document.getElementById('qplan'),qd=document.getElementById('qdec'),qgn=document.getElementById('qgn');
 const plan=+qp.value, planStd=+qp.selectedOptions[0].dataset.std, k=qd.value, guests=Math.max(100,+qgn.value||100);
 const eg=Math.max(0,guests-100), et=Math.max(0,Math.ceil(guests/10)-10), add=eg*50+et*PRICE[k].cp;
 const decor=PRICE[k].base+add, std=Math.round(decor*PRICE[k].std/PRICE[k].base), save=(std-decor)+(planStd-plan), total=plan+decor;
 const nm={soiree:'Bloom',signature:'Signature',atelier:'Elegance'}[k];
 setText('q-plan',`${T[L].cur} ${fmt(plan)}`);
 setText('q-decname',`${T[L].decorWord}: ${nm} · ${guests} ${T[L].guestsWord}`);
 setText('q-dec',`${T[L].cur} ${fmt(decor)}`);
 setText('q-total',`${T[L].cur} ${fmt(total)}`);
 setText('q-save',`${T[L].cur} ${fmt(save)}`);
}
let bound=false;
function bindCalc(){
 if(bound) return; bound=true;
 const g=cg(),gn=cgn();
 g.addEventListener('input',()=>{gn.value=g.value;decorCalc();});
 gn.addEventListener('input',()=>{g.value=Math.min(600,Math.max(100,+gn.value||100));decorCalc();});
 const qp=document.getElementById('qplan'),qd=document.getElementById('qdec'),qg=document.getElementById('qg'),qgn=document.getElementById('qgn');
 qp.onchange=quoteCalc; qd.onchange=quoteCalc;
 qg.addEventListener('input',()=>{qgn.value=qg.value;quoteCalc();});
 qgn.addEventListener('input',()=>{qg.value=Math.min(600,Math.max(100,+qgn.value||100));quoteCalc();});
}
function setLang(l){render(l);}
render('en');
</script>
